<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .logo { font-size: 24px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #1e293b;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .status-dot.checking { background: #eab308; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2557a7, #3b82f6);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #475569;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🚀</span>
    <h1>Indeeeed Optimizer</h1>
  </div>

  <div class="status-row">
    <span class="status-dot checking" id="backend-dot"></span>
    <span id="backend-status">Checking backend...</span>
  </div>

  <div class="status-row">
    <span class="status-dot checking" id="page-dot"></span>
    <span id="page-status">Checking page...</span>
  </div>

  <button class="btn btn-primary" id="open-dashboard">Open Dashboard</button>
  <button class="btn btn-secondary" id="check-connection">Refresh Status</button>

  <div class="footer">v1.2.0 — Indeed Application Optimizer</div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
